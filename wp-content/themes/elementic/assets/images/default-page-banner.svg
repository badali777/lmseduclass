<svg width="1200" height="400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#2d2d2d;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#ff8c00;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ff8c00;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:0" />
    </radialGradient>
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bannerGradient)"/>
  <rect width="1200" height="400" fill="url(#gridPattern)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="100" fill="url(#glowGradient)"/>
  <circle cx="1050" cy="300" r="120" fill="url(#glowGradient)"/>
  <circle cx="600" cy="200" r="80" fill="url(#glowGradient)"/>
  
  <!-- Geometric shapes -->
  <polygon points="100,350 200,250 300,350" fill="rgba(255,140,0,0.2)"/>
  <polygon points="900,50 1000,150 1100,50" fill="rgba(255,140,0,0.15)"/>
  <rect x="500" y="300" width="200" height="80" fill="rgba(255,140,0,0.1)" transform="rotate(15 600 340)"/>
</svg>

